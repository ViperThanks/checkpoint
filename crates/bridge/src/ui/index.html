<!-- Login overlay -->
<div class="token-overlay" id="token-overlay">
  <div class="token-box">
    <div class="token-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Agent Aspect</span>
    </div>
    <p class="token-desc">登录 Bridge 控制面板</p>
    <input type="text" id="username-input" placeholder="用户名" value="admin" autocomplete="username">
    <input type="password" id="password-input" placeholder="密码" autocomplete="current-password">
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">登录</button>
    <p class="token-hint" id="login-error" style="display:none;color:var(--red)"></p>
  </div>
</div>

<!-- App container -->
<div id="app" class="hidden">
  <!-- Sidebar (desktop only) -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Agent Aspect</span>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-link active" id="nav-home" onclick="switchTab('home')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>首页</span>
      </a>
      <a class="sidebar-link" id="nav-conv" onclick="switchTab('conv')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>会话</span>
      </a>
      <a class="sidebar-link" id="nav-events" onclick="switchTab('events')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>审计</span>
      </a>
      <a class="sidebar-link" id="nav-run" onclick="switchTab('run')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>运行</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="mode-indicator" id="sidebar-mode">Guard</div>
      <div class="sidebar-footer-actions">
        <button class="sidebar-logout" onclick="showChangePassword()">修改密码</button>
        <button class="sidebar-logout" onclick="doLogout()">退出</button>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题"><span class="theme-toggle-icon">🌙</span></button>
      </div>
      <div class="sidebar-version" id="sidebar-version"></div>
    </div>
  </aside>

  <!-- Main content area -->
  <main id="main">
    <!-- Mobile header -->
    <header id="header">
      <div class="header-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Agent Aspect</span>
        <span class="dot dot-on" id="header-dot"></span>
      </div>
      <div class="header-mode-pills" id="header-mode-pills"></div>
      <button class="header-logout" onclick="doLogout()">退出</button>
    </header>

    <!-- Tab views -->
    <div id="tab-content">
      <!-- Home -->
      <div id="home-view" class="view"></div>
      <!-- Conversations -->
      <div id="conv-view" class="view hidden">
        <div class="conv-layout">
          <div class="conv-list-panel" id="conv-list-panel">
            <div class="conv-filter-bar" id="conv-filter-bar"></div>
            <div class="conv-list" id="conv-list"></div>
            <div class="pager">
              <button class="pager-btn" id="conv-btn-prev" onclick="convPagePrev()">上一页</button>
              <span class="pager-info" id="conv-pager-info"></span>
              <button class="pager-btn" id="conv-btn-next" onclick="convPageNext()">下一页</button>
            </div>
          </div>
          <div class="conv-detail-panel" id="conv-detail-panel">
            <div class="conv-detail-header" id="conv-detail-header"></div>
            <div class="conv-sub-tabs">
              <div class="conv-sub-btn active" id="sub-chat" onclick="switchSubTab('chat')">聊天</div>
              <div class="conv-sub-btn" id="sub-tools" onclick="switchSubTab('tools')">工具</div>
            </div>
            <div class="conv-sub-content" id="conv-sub-content"></div>
          </div>
        </div>
      </div>
      <!-- Events -->
      <div id="events-view" class="view hidden">
        <div class="events-layout">
          <div class="events-sidebar" id="events-sidebar">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <h3>筛选</h3>
              <button class="icon-btn" id="events-filter-close" onclick="closeDetail()" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <select class="filter-select" id="s-action" onchange="syncFilters()">
              <option value="">全部状态</option>
              <option value="allow">允许</option>
              <option value="deny">拒绝</option>
              <option value="ask">待审批</option>
            </select>
            <select class="filter-select" id="s-agent" onchange="syncFilters()">
              <option value="">全部代理</option>
              <option value="claude_code">Claude Code</option>
              <option value="codex_cli">Codex CLI</option>
              <option value="kimi_code">Kimi Code</option>
              <option value="gemini_cli">Gemini CLI</option>
            </select>
            <select class="filter-select" id="s-verdict" onchange="syncFilters()">
              <option value="">全部评价</option>
              <option value="useful">有用</option>
              <option value="noisy">噪音</option>
              <option value="wrong">错误</option>
              <option value="unsure">不确定</option>
              <option value="unlabeled">未标注</option>
            </select>
            <h3 style="margin-top:8px">待审批 <span id="pending-count" style="font-size:.72rem;color:var(--yellow)"></span></h3>
            <div id="pending-box"></div>
          </div>
          <div class="events-main">
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
              <button class="btn btn-ghost btn-sm" id="events-filter-toggle" onclick="toggleEventsSidebar()" style="display:none">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
                筛选
              </button>
              <span style="font-size:.8rem;color:var(--dim);margin-left:auto" id="stat-events"></span>
            </div>
            <div class="events-list" id="events-list"></div>
            <div class="pager">
              <button class="pager-btn" id="btn-prev" onclick="pagePrev()">上一页</button>
              <span class="pager-info" id="pager-info"></span>
              <button class="pager-btn" id="btn-next" onclick="pageNext()">下一页</button>
            </div>
          </div>
        </div>
      </div>
      <!-- Run -->
      <div id="run-view" class="view hidden"></div>
    </div>
  </main>

  <!-- Detail panel (desktop) / Mobile overlay -->
  <aside id="detail-panel" class="hidden">
    <div class="detail-header">
      <button class="detail-back" id="detail-back" onclick="closeDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        返回
      </button>
      <button class="detail-close" onclick="closeDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="detail-scroll" id="detail-scroll"></div>
  </aside>

  <!-- Mobile bottom tab bar -->
  <nav id="tab-bar">
    <a class="tab-item active" id="tab-home" onclick="switchTab('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </a>
    <a class="tab-item" id="tab-conv" onclick="switchTab('conv')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>会话</span>
    </a>
    <a class="tab-item" id="tab-events" onclick="switchTab('events')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>审计</span>
    </a>
    <a class="tab-item" id="tab-run" onclick="switchTab('run')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span>运行</span>
    </a>
  </nav>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Change password modal -->
<div class="modal-overlay hidden" id="chpwd-modal">
  <div class="token-box" style="max-width:360px">
    <h3 style="margin:0 0 12px;font-size:16px">修改密码</h3>
    <input type="password" id="chpwd-old" placeholder="当前密码" autocomplete="current-password">
    <input type="password" id="chpwd-new" placeholder="新密码（至少 12 字符）" autocomplete="new-password">
    <input type="password" id="chpwd-confirm" placeholder="确认新密码" autocomplete="new-password">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="doChangePassword()">确认</button>
      <button class="btn" style="flex:1" onclick="closeChangePassword()">取消</button>
    </div>
    <p class="token-hint" id="chpwd-error" style="display:none;color:var(--red)"></p>
  </div>
</div>
